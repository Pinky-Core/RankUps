# VanguardRankUps Configuration
# Author: Lewis Ainsworth
# Este archivo contiene toda la configuración del plugin

# Configuración de Base de Datos
database:
  type: "sqlite" # sqlite, mysql
  mysql:
    host: "localhost"
    port: 3306
    database: "rankups"
    username: "root"
    password: "password"
  sqlite:
    file: "rankups.db"

# Configuración General
settings:
  prefix: "&8[&cVanguard&bRankUps&8] &r"
  debug: false
  auto-save-interval: 300 # segundos
  max-rank: 10
  luckperms:
    enabled: true
    remove_previous_group: true
    respect_luckperms_prefix: true

# Configuración de Mensajes
messages:
  no_permission: "&cNo tienes permisos para usar este comando."
  player_not_found: "&cJugador no encontrado."
  rankup_success: "&a¡Felicidades! Has alcanzado el rango %rank%!"
  rankup_failed: "&cNo cumples los requisitos para el siguiente rango."
  already_max_rank: "&cYa tienes el rango máximo."
  config_reloaded: "&aConfiguración recargada exitosamente."
  rank_forced: "&aRango forzado para %player%."
  rank_reset: "&aProgreso de %player% reseteado."
  rank_set: "&aRango de %player% establecido a %rank%."
  
  # Mensajes de progreso - Traducciones firmes
  progress_mob_kills: "&cMobs eliminados: %current%/%required%"
  progress_block_breaks: "&6Bloques minados: %current%/%required%"
  progress_playtime: "&eTiempo jugado: %current%/%required% minutos"
  progress_fishing: "&bPescas: %current%/%required%"
  progress_farming: "&aCultivos: %current%/%required%"
  
  # Mensajes de GUI
  gui_title: "&8VanguardRankUps - %player%"
  gui_progress_title: "&bProgreso del Rango"
  gui_requirements_title: "&cRequisitos Pendientes"
  gui_completed: "&a&l¡Completado!"
  gui_incomplete: "&7%current%&8/&f%required%"

# Configuración de Sonidos
sounds:
  rankup_success: "ENTITY_PLAYER_LEVELUP"
  progress_update: "BLOCK_NOTE_BLOCK_PLING"

# Configuración de GUI - Personalizable
gui:
  title: "&8VanguardRankUps - %player%"
  progress_bar:
    filled: "&a█"
    empty: "&7█"
    length: 20
    show_percentage: true
    show_numbers: true
  colors:
    title: "&b&l"
    section: "&e&l"
    completed: "&a&l"
    incomplete: "&7"
    separator: "&8&m"
  layout:
    show_progress_bars: true
    show_detailed_stats: true
    show_rank_info: true
    show_next_rank_preview: true

# ========================================
# CONFIGURACIÓN DE RANGOS
# ========================================

# Rango 1: Default -> Plebeyo I
Aexample:
  # nombre del grupo que el jugador necesita tener para subir
  rank: 'default'
  # nombre del grupo que el jugador obtendra
  next: 'plebeyo-i'
  display-name: 'X'
  # Lista de requisitos para poder subir al siguiente rango
  # https://okx.sh/rankup/List-of-Requirements.html
  requirements:
    - 'playtime-minutes 20'
    - 'block-break STONE 100'
    - 'mob-kills Zombie 10'
  commands:
    - 'eco give %player_name% 3000'
    - 'give %player_name% golden_apple 16'
    - 'lp user %player_name% parent remove %rankup_current_rank%'
    - 'lp user %player_name% parent add %rankup_next_rank%'
    - 'playsound ui.toast.challenge_complete player %player_name% ~ ~ ~'
    - 'particle firework ~ ~1 ~ 1 1 1 0 50 normal'
    - 'title %player_name% title {"text":"Subiste de rango!","bold":true,"color":"light_purple"}'
#Aqui te dejo un ejemplo para que pongas lo que ocupan por rango.
#qlo si crees que voy a buscar y modificar placeholder por cada tipo de requisitos .|.
  rankup:
    requirements-not-met: |-
      &4&m+                                       +
      &cNecesitas
      &c- &d&lTiempo Jugado &c&l- &b[%progress_bar_{statistic_minutes_played}_c:&d|_p:&d|_r:&3|_l:20_m:20_fullbar:&a&lCompletado!%&b]
      &c- &d&lPiedra Minada &c&l- &b[%progress_bar_{statistic_mine_block:stone}_c:&d|_p:&d|_r:&3|_l:20_m:100_fullbar:&a&lCompletado!%&b]
      &c- &d&lZombies Asesinados &c&l- &b[%progress_bar_{statistic_kill_entity:Zombie}_c:&d|_p:&d|_r:&3|_l:20_m:10_fullbar:&a&lCompletado!%&b]
      &cPara subir de &7&l%rankup_current_rank%&r&c a &e&l%rankup_next_rank%&r&c!
      &cMas informacion en: &awiki.vanguardmc.org
      &4&m+                                       +
